<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Keyboard - 智能键盘设计</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-key: #1a1a24;
            --bg-key-hover: #252532;
            --bg-key-active: #3a3a4a;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border: #27272a;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--text-primary);
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .keyboard-wrapper {
            background: var(--bg-secondary);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px var(--shadow);
            border: 1px solid var(--border);
        }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .row {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .key {
            min-width: 48px;
            height: 48px;
            background: var(--bg-key);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            position: relative;
        }

        .key:hover {
            background: var(--bg-key-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .key:active, .key.active {
            background: var(--bg-key-active);
            transform: translateY(0);
        }

        .key.space {
            min-width: 280px;
        }

        .key.wide {
            min-width: 72px;
        }

        .key.extra-wide {
            min-width: 88px;
        }

        .key.fn {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .key.special {
            color: var(--accent);
        }

        .key svg {
            width: 20px;
            height: 20px;
        }

        .display {
            background: var(--bg-primary);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .display-text {
            font-size: 1.5rem;
            font-weight: 500;
            min-height: 2rem;
            color: var(--text-primary);
            letter-spacing: 0.05em;
        }

        .display-placeholder {
            color: var(--text-secondary);
        }

        .modes {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
        }

        .mode-btn {
            background: var(--bg-key);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .mode-btn:hover {
            background: var(--bg-key-hover);
            color: var(--text-primary);
        }

        .mode-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .info {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .info span {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .keyboard-wrapper {
                padding: 1rem;
                border-radius: 1rem;
            }

            .key {
                min-width: 32px;
                height: 40px;
                font-size: 0.75rem;
                border-radius: 6px;
            }

            .key.space {
                min-width: 160px;
            }

            .key.wide {
                min-width: 48px;
            }

            .key.extra-wide {
                min-width: 56px;
            }
        }

        .glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .glow-1 {
            top: -200px;
            left: -200px;
        }

        .glow-2 {
            bottom: -200px;
            right: -200px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.3) 0%, transparent 70%);
        }

        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 var(--accent-glow); }
            100% { box-shadow: 0 0 0 10px transparent; }
        }

        .key.ripple {
            animation: ripple 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    
    <div class="container">
        <header>
            <h1>AI Keyboard</h1>
            <p class="subtitle">基于 Figma 设计生成的智能键盘组件</p>
        </header>

        <div class="keyboard-wrapper">
            <div class="display">
                <div class="display-text" id="displayText">
                    <span class="display-placeholder">在此输入...</span>
                </div>
            </div>

            <div class="keyboard" id="keyboard">
                <div class="row">
                    <div class="key special" data-key="`">`</div>
                    <div class="key" data-key="1">1</div>
                    <div class="key" data-key="2">2</div>
                    <div class="key" data-key="3">3</div>
                    <div class="key" data-key="4">4</div>
                    <div class="key" data-key="5">5</div>
                    <div class="key" data-key="6">6</div>
                    <div class="key" data-key="7">7</div>
                    <div class="key" data-key="8">8</div>
                    <div class="key" data-key="9">9</div>
                    <div class="key" data-key="0">0</div>
                    <div class="key" data-key="-">-</div>
                    <div class="key" data-key="=">=</div>
                    <div class="key wide fn" data-key="backspace">⌫</div>
                </div>
                <div class="row">
                    <div class="key wide fn" data-key="tab">Tab</div>
                    <div class="key" data-key="q">Q</div>
                    <div class="key" data-key="w">W</div>
                    <div class="key" data-key="e">E</div>
                    <div class="key" data-key="r">R</div>
                    <div class="key" data-key="t">T</div>
                    <div class="key" data-key="y">Y</div>
                    <div class="key" data-key="u">U</div>
                    <div class="key" data-key="i">I</div>
                    <div class="key" data-key="o">O</div>
                    <div class="key" data-key="p">P</div>
                    <div class="key" data-key="[">[</div>
                    <div class="key" data-key="]">]</div>
                    <div class="key extra-wide fn" data-key="\">\</div>
                </div>
                <div class="row">
                    <div class="key extra-wide fn" data-key="caps">Caps</div>
                    <div class="key" data-key="a">A</div>
                    <div class="key" data-key="s">S</div>
                    <div class="key" data-key="d">D</div>
                    <div class="key" data-key="f">F</div>
                    <div class="key" data-key="g">G</div>
                    <div class="key" data-key="h">H</div>
                    <div class="key" data-key="j">J</div>
                    <div class="key" data-key="k">K</div>
                    <div class="key" data-key="l">L</div>
                    <div class="key" data-key=";">;</div>
                    <div class="key" data-key="'">'</div>
                    <div class="key wide fn special" data-key="enter">Enter</div>
                </div>
                <div class="row">
                    <div class="key extra-wide fn special" data-key="shift" id="shiftKey">Shift</div>
                    <div class="key" data-key="z">Z</div>
                    <div class="key" data-key="x">X</div>
                    <div class="key" data-key="c">C</div>
                    <div class="key" data-key="v">V</div>
                    <div class="key" data-key="b">B</div>
                    <div class="key" data-key="n">N</div>
                    <div class="key" data-key="m">M</div>
                    <div class="key" data-key=",">,</div>
                    <div class="key" data-key=".">.</div>
                    <div class="key" data-key="/">/</div>
                    <div class="key extra-wide fn special" data-key="shift-r">Shift</div>
                </div>
                <div class="row">
                    <div class="key fn" data-key="ctrl">Ctrl</div>
                    <div class="key fn" data-key="win">Win</div>
                    <div class="key fn" data-key="alt">Alt</div>
                    <div class="key space" data-key=" "></div>
                    <div class="key fn" data-key="alt-r">Alt</div>
                    <div class="key fn" data-key="fn">Fn</div>
                    <div class="key fn" data-key="ctrl-r">Ctrl</div>
                    <div class="key special" data-key="←">←</div>
                    <div class="key special" data-key="↑">↑</div>
                    <div class="key special" data-key="↓">↓</div>
                    <div class="key special" data-key="→">→</div>
                </div>
            </div>

            <div class="modes">
                <button class="mode-btn active" data-mode="lower">小写</button>
                <button class="mode-btn" data-mode="upper">大写</button>
                <button class="mode-btn" data-mode="symbol">符号</button>
            </div>
        </div>

        <div class="info">
            <p>设计来源: <span>Figma</span> | 代码生成: <span>AI</span> | 部署平台: <span>GitHub Pages</span></p>
        </div>
    </div>

    <script>
        const keyboard = document.getElementById('keyboard');
        const displayText = document.getElementById('displayText');
        const shiftKey = document.getElementById('shiftKey');
        let isShift = false;
        let text = '';

        const keyMap = {
            lower: 'qwertyuiopasdfghjklzxcvbnm',
            upper: 'QWERTYUIOPASDFGHJKLZXCVBNM',
            symbol: '`1234567890-=[];,./'
        };

        const modeButtons = document.querySelectorAll('.mode-btn');
        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                modeButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateKeyboard(btn.dataset.mode);
            });
        });

        function updateKeyboard(mode) {
            const keys = keyboard.querySelectorAll('.key[data-key]');
            keys.forEach(key => {
                const keyVal = key.dataset.key;
                if (keyVal.length === 1) {
                    if (mode === 'lower') {
                        key.textContent = keyVal.toLowerCase();
                    } else if (mode === 'upper') {
                        key.textContent = keyVal.toUpperCase();
                    } else if (mode === 'symbol') {
                        key.textContent = keyMap.symbol[keyMap.lower.indexOf(keyVal.toLowerCase())] || keyVal;
                    }
                }
            });
        }

        keyboard.addEventListener('click', (e) => {
            const key = e.target.closest('.key');
            if (!key) return;

            key.classList.add('ripple');
            setTimeout(() => key.classList.remove('ripple'), 300);

            const keyVal = key.dataset.key;
            
            if (keyVal === 'backspace') {
                text = text.slice(0, -1);
            } else if (keyVal === ' ') {
                text += ' ';
            } else if (keyVal.length === 1) {
                text += key.textContent;
            }

            updateDisplay();
        });

        function updateDisplay() {
            if (text.length === 0) {
                displayText.innerHTML = '<span class="display-placeholder">在此输入...</span>';
            } else {
                displayText.textContent = text;
            }
        }

        document.addEventListener('keydown', (e) => {
            const keyElement = keyboard.querySelector(`[data-key="${e.key.toLowerCase()}"]`);
            if (keyElement) {
                keyElement.classList.add('active');
                keyElement.click();
            }
        });

        document.addEventListener('keyup', (e) => {
            const keyElement = keyboard.querySelector(`[data-key="${e.key.toLowerCase()}"]`);
            if (keyElement) {
                keyElement.classList.remove('active');
            }
        });
    </script>
</body>
</html>
